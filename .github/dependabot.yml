# Dependabot — keep dependencies and CI actions patched.
# Grouped + weekly to avoid PR noise; the CI test/audit gates guard merges.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Patch/minor bumps batched into one PR per group.
      production-minor:
        applies-to: version-updates
        dependency-type: "production"
        update-types: ["minor", "patch"]
      dev-minor:
        applies-to: version-updates
        dependency-type: "development"
        update-types: ["minor", "patch"]
    # Majors come as individual PRs (they may need code changes).

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

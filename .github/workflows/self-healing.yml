name: Self-Healing UI Audit

on:
  schedule:
    - cron: '0 6 * * 1-5' # Weekdays at 6 AM UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  heal:
    name: Self-Healing UI Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Start web server
        run: npm run dev &
        env:
          DATABASE_URL: file:${{ github.workspace }}/packages/database/prisma/dev.db
          TENANT_ID: demo-tenant

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Self-Healing Pipeline
        run: npx tsx lib/self-healing/pipeline.ts suggest
        env:
          DATABASE_URL: file:${{ github.workspace }}/packages/database/prisma/dev.db
          TENANT_ID: demo-tenant

      - name: Upload Healing Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-healing-report
          path: |
            ui-audit/reports/self-healing-report.json
            ui-audit/reports/self-healing-report.md
            ui-audit/reports/fixes.json
            ui-audit/screenshots/
          retention-days: 30

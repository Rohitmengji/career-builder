# ================================================================
# Career Builder SaaS — CI/CD Pipeline
# ================================================================
#
# Runs on every PR and push to main.
# Steps: install → type check → lint → test → build
# Prevents bad deploys by failing on any error.
#
# Vercel handles production deployment via Git integration.
# This pipeline is the safety gate before Vercel deploys.
# ================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Required by Prisma generate (build step)
  DATABASE_URL: "file:./ci-test.db"
  TENANT_ID: "ci-test"
  # Suppress warnings in CI
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  ci:
    name: Type Check, Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Verify Turso DDL parity (schema.prisma ↔ turso-schema.sql)
        run: cd packages/database && npx tsx verify-turso-schema.ts

      - name: Smoke-test libSQL driver adapter (prod DB path)
        # CI's DATABASE_URL is sqlite; prod is Turso/libSQL. Construct the
        # libSQL adapter + PrismaClient against a local libSQL file so adapter
        # breakage (e.g. @prisma/adapter-libsql version mismatch) fails CI
        # instead of production. Offline — no Turso connection required.
        run: cd packages/database && npx tsx -e "const {PrismaLibSQL}=require('@prisma/adapter-libsql'); const a=new PrismaLibSQL({url:'file:./ci-smoke.db'}); const {PrismaClient}=require('@prisma/client'); const c=new PrismaClient({adapter:a}); if(!c) throw new Error('libSQL adapter failed'); console.log('✅ libSQL adapter + PrismaClient construct OK');"

      - name: Type Check (admin)
        run: npx tsc --noEmit --project apps/admin/tsconfig.json

      - name: Type Check (web)
        run: npx tsc --noEmit --project apps/web/tsconfig.json

      - name: Lint (admin)
        run: cd apps/admin && npx eslint . --max-warnings 0
        continue-on-error: false

      - name: Lint (web)
        run: cd apps/web && npx eslint . --max-warnings 0
        continue-on-error: false

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Dependency audit (fail on critical)
        # Required gate, but scoped to CRITICAL so unfixable transitive
        # advisories don't wedge CI. High/moderate are surfaced informationally
        # by the second step below.
        run: npm audit --audit-level=critical

      - name: Dependency audit (report high/moderate)
        run: npm audit --audit-level=high || true

      - name: Build (all apps)
        run: npm run build

      - name: Verify build artifacts
        run: |
          echo "Checking admin build..."
          test -d apps/admin/.next || (echo "Admin build failed!" && exit 1)
          echo "Checking web build..."
          test -d apps/web/.next || (echo "Web build failed!" && exit 1)
          echo "✅ All builds passed"

  # Separate job for DB migration safety check
  migration-safety:
    name: Migration Safety Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so `git diff origin/main...HEAD` actually resolves —
          # the default shallow clone never fetches origin/main, which silently
          # disabled this guard.
          fetch-depth: 0

      - name: Check for destructive migrations
        run: |
          # Ensure the base ref is available for the diff.
          git fetch --no-tags --depth=1 origin main || true
          # Check if Prisma schema changed
          if git diff --name-only origin/main...HEAD | grep -q "schema.prisma"; then
            echo "⚠️  Prisma schema changed — reviewing for safety..."
            
            # Check for destructive operations
            DIFF=$(git diff origin/main...HEAD -- packages/database/prisma/schema.prisma)
            
            if echo "$DIFF" | grep -E '^\-\s*(model|@@)' | head -5; then
              echo ""
              echo "🚨 POTENTIAL DESTRUCTIVE MIGRATION DETECTED"
              echo "Please review the schema changes carefully."
              echo "Dropped models or indexes found in the diff."
              echo ""
              echo "If this is intentional, add [migration-safe] to your PR description."
              
              # Only fail if PR description doesn't contain the override
              if ! echo "${{ github.event.pull_request.body }}" | grep -q "\[migration-safe\]"; then
                exit 1
              fi
            else
              echo "✅ Schema changes look safe (no destructive operations)"
            fi
          else
            echo "✅ No schema changes"
          fi
